name: Bai4.yml
on:
  push:
    branches: [ "main" ]


jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, window-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with test
        run: mvn -B package
